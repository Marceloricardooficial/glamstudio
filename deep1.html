<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Studio Pro - PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Google Identity Services (para Calendar API) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Seus estilos originais + pequenos ajustes */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        :root {
            --primary-purple: #6d28d9;
            --dark-purple: #2e1065;
            --light-purple: #a78bfa;
            --bg-purple: #f5f3ff;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-purple);
            padding-bottom: 110px;
            color: #1e1b4b;
        }
        .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(109,40,217,0.1); }
        .floating-menu { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; background: var(--dark-purple); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(46,16,101,0.4); z-index: 1000; }
        .menu-item { color: #c4b5fd; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; opacity: 0.7; }
        .menu-item.active { color: white; opacity: 1; transform: translateY(-5px); }
        .menu-item.active i { background: var(--primary-purple); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 4px; box-shadow: 0 4px 15px rgba(109,40,217,0.5); }
        .credit-card-gradient { background: linear-gradient(135deg, #4c1d95 0%, #2e1065 100%); color: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(46,16,101,0.25); }
        .day-pill { min-width: 65px; height: 85px; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .day-pill.active { background: var(--primary-purple); color: white; transform: scale(1.1); box-shadow: 0 8px 20px rgba(109,40,217,0.3); }
        .action-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .action-btn:hover { transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal { transition: opacity 0.25s ease; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6d28d9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Header igual ao original (com ajuste de estado de login) -->
<header class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50">
    <div><h1 class="text-2xl font-extrabold text-indigo-950 tracking-tight">Studio Pro</h1></div>
    <div id="auth-container" class="flex items-center gap-3">
        <button id="login-btn" class="bg-violet-700 hover:bg-violet-800 text-white px-5 py-2.5 rounded-full text-xs font-bold transition-all shadow-lg">ENTRAR COM GOOGLE</button>
        <div id="user-profile" class="hidden flex items-center gap-2 animate-fade-in">
            <span class="text-[10px] text-violet-700 font-bold bg-violet-100 px-3 py-1.5 rounded-full flex items-center gap-2"><span class="w-2 h-2 bg-violet-600 rounded-full animate-ping"></span>ONLINE</span>
            <img id="user-avatar" src="" alt="Perfil" class="w-11 h-11 rounded-full border-2 border-violet-200 shadow-md">
            <button id="logout-btn" class="text-xs text-violet-500 hover:text-violet-700 ml-1"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</header>

<main class="max-w-md mx-auto p-5 space-y-8">
    <!-- Finance Card (dinâmico) -->
    <section class="credit-card-gradient p-7">
        <div class="flex justify-between items-start mb-8"><div><span class="text-[10px] uppercase tracking-widest opacity-70 font-bold">Resumo Financeiro</span><span class="text-xl font-bold">Painel de Controle</span></div><div class="bg-white/10 p-2 rounded-lg"><i class="fas fa-crown text-amber-400"></i></div></div>
        <div class="grid grid-cols-4 gap-2 text-center border-b border-white/10 pb-5 mb-5"><div class="text-[9px] uppercase">Atendimentos</div><div class="text-[9px] uppercase">Hoje</div><div class="text-[9px] uppercase">Semana</div><div class="text-[9px] uppercase">Mês</div><div class="text-xs font-medium">Qtd:</div><div id="count-today" class="text-lg font-bold">0</div><div id="count-week" class="text-lg font-bold">0</div><div id="count-month" class="text-lg font-bold">0</div></div>
        <div class="grid grid-cols-4 gap-2 text-center"><div class="text-[9px] uppercase tracking-tighter opacity-60 font-bold pt-1">Faturamento</div><div id="revenue-today" class="text-[10px] font-bold bg-white/10 py-1 rounded">R$ 0</div><div id="revenue-week" class="text-[10px] font-bold bg-white/10 py-1 rounded">R$ 0</div><div id="revenue-month" class="text-[10px] font-bold bg-white/10 py-1 rounded">R$ 0</div></div>
    </section>

    <!-- Calendário -->
    <section class="space-y-5"><div class="flex justify-between items-end px-1"><div><p class="text-xs font-bold text-violet-400 uppercase tracking-widest">Calendário</p><h3 id="current-month" class="font-extrabold text-indigo-950 text-xl">Abril 2024</h3></div><div class="flex gap-2 mb-1"><button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm text-violet-700"><i class="fas fa-chevron-left"></i></button><button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm text-violet-700"><i class="fas fa-chevron-right"></i></button></div></div>
    <div id="calendar-days" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div></section>

    <!-- Próximos horários -->
    <section class="space-y-4"><div class="flex justify-between items-center"><h4 class="font-bold text-indigo-950">Próximos Horários</h4><button id="sync-now-btn" class="text-violet-600 text-xs font-bold border-b-2 border-violet-100 pb-0.5"><i class="fas fa-sync-alt mr-1"></i>Sincronizar agora</button></div>
    <div id="appointments-list" class="space-y-4"></div></section>

    <!-- Gráfico -->
    <section class="bg-white p-6 rounded-[32px] shadow-xl shadow-violet-100 border border-violet-50"><div class="flex justify-between items-center mb-6"><h4 class="font-bold text-indigo-950">Desempenho Semanal</h4><span class="text-[10px] font-bold text-green-500 bg-green-50 px-2 py-1 rounded">+12%</span></div><div class="h-56 w-full"><canvas id="weeklyChart"></canvas></div></section>
</main>

<nav class="floating-menu"><a href="#" class="menu-item active"><i class="fas fa-home text-lg"></i><span>Home</span></a><a href="#" class="menu-item"><i class="fas fa-calendar-day text-lg"></i><span>Agenda</span></a><a href="#" class="menu-item"><i class="fas fa-chart-pie text-lg"></i><span>Finanças</span></a><a href="#" class="menu-item"><i class="fas fa-user-friends text-lg"></i><span>Clientes</span></a></nav>

<!-- Modal de sincronização inicial -->
<div id="sync-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden modal">
    <div class="bg-white rounded-3xl p-6 w-[90%] max-w-sm space-y-4">
        <h3 class="font-bold text-indigo-950 text-xl">Sincronizar com Google Agenda</h3>
        <p class="text-sm text-gray-600">Puxar eventos a partir de qual data?</p>
        <input type="date" id="sync-start-date" class="w-full border border-violet-200 rounded-xl p-3">
        <button id="confirm-sync" class="w-full bg-violet-700 text-white py-3 rounded-xl font-bold">Sincronizar</button>
        <button id="cancel-sync" class="w-full text-violet-500 text-sm">Agora não</button>
    </div>
</div>

<script>
    // ---------- CONFIGURAÇÕES ----------
    const firebaseConfig = {
        apiKey: "AIzaSyDOkgAXmN3HqB_zjfiMT7QQ1cvRmFtu8lA",
        authDomain: "glam-studio-8b65c.firebaseapp.com",
        projectId: "glam-studio-8b65c",
        storageBucket: "glam-studio-8b65c.firebasestorage.app",
        messagingSenderId: "154294556895",
        appId: "1:154294556895:web:a42cad3171fb0fbfa7716a"
    };
    const CLIENT_ID = "1053509141917-v8hgde8nrl8gd0k7a7acko6tibenobi6.apps.googleusercontent.com";
    const CALENDAR_SCOPES = "https://www.googleapis.com/auth/calendar.events";

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let googleAuthToken = null;        // token de acesso para Calendar API
    let allAppointments = [];           // cache local
    let chartInstance = null;
    let selectedDate = new Date();

    // ---------- FUNÇÕES AUXILIARES ----------
    const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const weekDaysShort = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

    function showLoader(show) { /* simples: pode adicionar um spinner global */ }
    function extractPriceFromEvent(event) {
        // Tenta extrair valor da descrição ou do resumo (ex: "R$50" ou "50")
        let desc = event.description || event.summary || "";
        let match = desc.match(/\b(\d+(?:,\d{2})?)\b/);
        if (match) {
            let num = parseFloat(match[1].replace(',', '.'));
            return isNaN(num) ? 0 : num;
        }
        return 0;
    }

    // Renderizar dias do calendário (baseado em selectedDate)
    function renderCalendar() {
        const container = document.getElementById('calendar-days');
        const monthDisplay = document.getElementById('current-month');
        container.innerHTML = '';
        monthDisplay.innerText = `${months[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
        for (let i = -3; i <= 3; i++) {
            const day = new Date(selectedDate);
            day.setDate(selectedDate.getDate() + i);
            const isActive = i === 0;
            const pill = document.createElement('div');
            pill.className = `day-pill bg-white flex flex-col items-center justify-center rounded-2xl shadow-sm cursor-pointer ${isActive ? 'active' : 'text-slate-400'}`;
            pill.onclick = () => { selectedDate = day; renderCalendar(); updateAppointmentsList(); };
            pill.innerHTML = `<span class="text-[9px] uppercase font-black mb-1 opacity-80">${weekDaysShort[day.getDay()]}</span><span class="text-xl font-bold">${day.getDate()}</span>`;
            container.appendChild(pill);
        }
    }

    function changeWeek(direction) {
        selectedDate.setDate(selectedDate.getDate() + (direction * 7));
        renderCalendar();
        updateAppointmentsList();
    }

    // Atualizar lista de agendamentos exibida (baseado na data selecionada)
    async function updateAppointmentsList() {
        if (!currentUser) return;
        const listDiv = document.getElementById('appointments-list');
        const startOfDay = new Date(selectedDate);
        startOfDay.setHours(0,0,0,0);
        const endOfDay = new Date(selectedDate);
        endOfDay.setHours(23,59,59,999);
        const snapshot = await db.collection('appointments').where('userId', '==', currentUser.uid).where('start', '>=', startOfDay).where('start', '<=', endOfDay).orderBy('start').get();
        const appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (appointments.length === 0) {
            listDiv.innerHTML = '<div class="text-center text-violet-400 p-4">Nenhum horário para este dia</div>';
            return;
        }
        let html = '';
        appointments.forEach((apt, idx) => {
            const startHour = apt.start.toDate().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
            html += `
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-violet-50 flex justify-between items-center animate-fade-in" style="animation-delay: ${idx*0.1}s">
                <div class="flex gap-4 items-center"><div class="bg-violet-50 text-violet-700 font-bold text-xs p-3 rounded-xl">${startHour}</div><div><p class="font-bold text-indigo-950 text-sm leading-tight">${apt.summary || 'Sem título'}</p><p class="text-[11px] text-violet-400 font-medium">${apt.description?.substring(0,30) || ''}</p></div></div>
                <div class="flex flex-col items-end gap-2"><span class="font-bold text-indigo-950 text-sm">R$ ${apt.price ? apt.price.toFixed(2) : '0,00'}</span><div class="flex gap-1.5"><button class="action-btn bg-violet-50 text-violet-600 text-xs edit-apt" data-id="${apt.id}"><i class="fas fa-edit"></i></button><button class="action-btn bg-rose-50 text-rose-500 text-xs delete-apt" data-id="${apt.id}"><i class="fas fa-trash-alt"></i></button></div></div>
            </div>`;
        });
        listDiv.innerHTML = html;
        // Adicionar eventos de edição/exclusão
        document.querySelectorAll('.edit-apt').forEach(btn => btn.addEventListener('click', (e) => editAppointment(btn.dataset.id)));
        document.querySelectorAll('.delete-apt').forEach(btn => btn.addEventListener('click', (e) => deleteAppointment(btn.dataset.id)));
    }

    async function deleteAppointment(aptId) {
        if (!confirm('Remover este agendamento? Também será removido do Google Agenda.')) return;
        try {
            const aptDoc = await db.collection('appointments').doc(aptId).get();
            if (!aptDoc.exists) return;
            const aptData = aptDoc.data();
            // Remover do Google Calendar
            if (googleAuthToken && aptData.googleEventId) {
                await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${aptData.googleEventId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${googleAuthToken}` }
                });
            }
            await db.collection('appointments').doc(aptId).delete();
            updateAppointmentsList();
            updateSummaryCards();
        } catch (err) { console.error(err); alert('Erro ao excluir'); }
    }

    function editAppointment(aptId) { /* Implementar modal de edição; por simplicidade, pode redirecionar ou alertar */ alert('Funcionalidade de edição em desenvolvimento'); }

    // Sincronização com Google Calendar (buscar eventos a partir de uma data)
    async function syncFromGoogle(startDate) {
        if (!googleAuthToken) { alert('Conecte sua conta Google primeiro.'); return false; }
        const timeMin = startDate.toISOString();
        const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&singleEvents=true&orderBy=startTime&maxResults=250`;
        const response = await fetch(url, { headers: { 'Authorization': `Bearer ${googleAuthToken}` } });
        if (!response.ok) { alert('Erro ao buscar eventos'); return false; }
        const data = await response.json();
        const events = data.items || [];
        let imported = 0;
        for (const event of events) {
            const start = event.start.dateTime || event.start.date;
            const end = event.end.dateTime || event.end.date;
            if (!start) continue;
            const price = extractPriceFromEvent(event);
            const existing = await db.collection('appointments').where('googleEventId', '==', event.id).where('userId', '==', currentUser.uid).get();
            if (existing.empty) {
                await db.collection('appointments').add({
                    userId: currentUser.uid,
                    googleEventId: event.id,
                    summary: event.summary || 'Sem título',
                    description: event.description || '',
                    start: new Date(start),
                    end: end ? new Date(end) : null,
                    price: price,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                imported++;
            }
        }
        alert(`${imported} eventos importados do Google Calendar.`);
        updateAppointmentsList();
        updateSummaryCards();
        return true;
    }

    // Enviar um novo agendamento para Google Calendar e Firestore
    async function createAppointmentInGoogle(summary, description, startDateTime, endDateTime, price) {
        if (!googleAuthToken) throw new Error('Sem token do Google');
        const event = {
            summary: summary,
            description: description + ` (Valor: R$ ${price})`,
            start: { dateTime: startDateTime.toISOString(), timeZone: 'America/Sao_Paulo' },
            end: { dateTime: endDateTime.toISOString(), timeZone: 'America/Sao_Paulo' }
        };
        const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${googleAuthToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(event)
        });
        if (!response.ok) throw new Error('Falha ao criar evento');
        const googleEvent = await response.json();
        await db.collection('appointments').add({
            userId: currentUser.uid,
            googleEventId: googleEvent.id,
            summary: summary,
            description: description,
            start: startDateTime,
            end: endDateTime,
            price: price,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        updateAppointmentsList();
        updateSummaryCards();
    }

    // Atualizar cards de resumo financeiro (quantidade e faturamento)
    async function updateSummaryCards() {
        if (!currentUser) return;
        const now = new Date();
        const todayStart = new Date(now.setHours(0,0,0,0));
        const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const snaps = await db.collection('appointments').where('userId', '==', currentUser.uid).get();
        let countToday=0, countWeek=0, countMonth=0, revenueToday=0, revenueWeek=0, revenueMonth=0;
        snaps.forEach(doc => {
            const apt = doc.data();
            const start = apt.start.toDate();
            const price = apt.price || 0;
            if (start >= todayStart) { countToday++; revenueToday += price; }
            if (start >= weekStart) { countWeek++; revenueWeek += price; }
            if (start >= monthStart) { countMonth++; revenueMonth += price; }
        });
        document.getElementById('count-today').innerText = countToday;
        document.getElementById('count-week').innerText = countWeek;
        document.getElementById('count-month').innerText = countMonth;
        document.getElementById('revenue-today').innerText = `R$ ${revenueToday.toFixed(2)}`;
        document.getElementById('revenue-week').innerText = `R$ ${revenueWeek.toFixed(2)}`;
        document.getElementById('revenue-month').innerText = `R$ ${revenueMonth.toFixed(2)}`;
        updateChart();
    }

    function updateChart() { /* Recalcular dados do gráfico baseado nos appointments da semana */ }

    // Obter token de acesso do Google Calendar via OAuth 2.0 (popup)
    function getGoogleAuthToken() {
        return new Promise((resolve, reject) => {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: CALENDAR_SCOPES,
                callback: (resp) => {
                    if (resp.access_token) resolve(resp.access_token);
                    else reject(new Error(resp.error));
                }
            });
            client.requestAccessToken();
        });
    }

    // Fluxo de login Firebase + solicitar permissão Calendar
    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('https://www.googleapis.com/auth/calendar.events');
        try {
            const result = await auth.signInWithPopup(provider);
            currentUser = result.user;
            document.getElementById('user-profile').classList.remove('hidden');
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('user-avatar').src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=6d28d9&color=fff';
            // Solicitar token específico para Calendar (mesmo já tendo escopo, o token do Firebase não serve para API Calendar)
            googleAuthToken = await getGoogleAuthToken();
            // Verificar se já sincronizou alguma vez (salvar flag no Firestore)
            const syncMeta = await db.collection('syncMetadata').doc(currentUser.uid).get();
            if (!syncMeta.exists) {
                document.getElementById('sync-modal').classList.remove('hidden');
            } else {
                // Carregar appointments do Firestore
                await updateAppointmentsList();
                await updateSummaryCards();
            }
        } catch (err) { console.error(err); alert('Erro no login: '+err.message); }
    }

    function logout() {
        auth.signOut();
        currentUser = null;
        googleAuthToken = null;
        document.getElementById('user-profile').classList.add('hidden');
        document.getElementById('login-btn').classList.remove('hidden');
        document.getElementById('appointments-list').innerHTML = '';
    }

    // Eventos da UI
    document.getElementById('login-btn').onclick = loginWithGoogle;
    document.getElementById('logout-btn').onclick = logout;
    document.getElementById('sync-now-btn').onclick = async () => {
        if (!googleAuthToken) { alert('Faça login e autorize o Google Agenda.'); return; }
        const startDate = new Date(); startDate.setMonth(startDate.getMonth()-1); // padrão último mês
        await syncFromGoogle(startDate);
    };
    document.getElementById('confirm-sync').onclick = async () => {
        const startDateInput = document.getElementById('sync-start-date').value;
        const startDate = startDateInput ? new Date(startDateInput) : new Date();
        startDate.setHours(0,0,0,0);
        await syncFromGoogle(startDate);
        await db.collection('syncMetadata').doc(currentUser.uid).set({ lastSync: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('sync-modal').classList.add('hidden');
    };
    document.getElementById('cancel-sync').onclick = () => document.getElementById('sync-modal').classList.add('hidden');

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('user-profile').classList.remove('hidden');
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('user-avatar').src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=6d28d9&color=fff';
            if (!googleAuthToken) {
                try { googleAuthToken = await getGoogleAuthToken(); } catch(e) { console.warn(e); }
            }
            const syncMeta = await db.collection('syncMetadata').doc(currentUser.uid).get();
            if (!syncMeta.exists) document.getElementById('sync-modal').classList.remove('hidden');
            else { updateAppointmentsList(); updateSummaryCards(); }
        } else {
            currentUser = null; googleAuthToken = null;
            document.getElementById('user-profile').classList.add('hidden');
            document.getElementById('login-btn').classList.remove('hidden');
        }
    });

    renderCalendar();
    // Inicializar gráfico (placeholder)
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    chartInstance = new Chart(ctx, { type: 'bar', data: { labels: ['S','T','Q','Q','S','S','D'], datasets: [{ data: [0,0,0,0,0,0,0], backgroundColor: '#7c3aed', borderRadius: 10 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#6d28d9' } } } } });
    function updateChart() { /* Atualizar dataset com valores reais da semana */ }
</script>
</body>
</html>
