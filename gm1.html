                <p>Sincronizando Agenda...</p>
            </div>

    <!-- Modal Primeiro Acesso -->
    <div id="setup-modal" class="hidden fixed inset-0 sync-modal z-50 flex items-center justify-center p-6">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuração enviada
    const firebaseConfig = {
        apiKey: "AIzaSyDOkgAXmN3HqB_zjfiMT7QQ1cvRmFtu8lA",
        authDomain: "glam-studio-8b65c.firebaseapp.com",
        projectId: "glam-studio-8b65c",
        storageBucket: "glam-studio-8b65c.firebasestorage.app",
        messagingSenderId: "154294556895",
        appId: "1:154294556895:web:a42cad3171fb0fbfa7716a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/calendar.readonly');

    let currentUser = null;
    let googleAccessToken = null;

    // --- Fluxo de Autenticação ---
    document.getElementById('btn-login').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const credential = GoogleAuthProvider.credentialFromResult(result);
            googleAccessToken = credential.accessToken;
            
            // Garantir documento do usuário conforme regra (admin ou salonId)
            const userRef = doc(db, "users", result.user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    name: result.user.displayName,
                    email: result.user.email,
                    salonId: "default_salon", // Identificador padrão para as regras funcionarem
                    role: "user",
                    firstSyncDone: false
                });
            }
            
            showMainView();
        } catch (error) {
            console.error(error);
            alert("Erro no login: " + error.message);
        }
    };

    function showMainView() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        renderCalendar();
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            showMainView();
            checkFirstSync();
            listenAppointments();
        }
    });

    async function checkFirstSync() {
        const userSnap = await getDoc(doc(db, "users", currentUser.uid));
        if (userSnap.exists() && !userSnap.data().firstSyncDone) {
            document.getElementById('setup-modal').classList.remove('hidden');
        }
    }

    // --- Sincronismo Google Calendar ---
    async function syncEvents(startDateISO) {
        if (!googleAccessToken) {
            alert("Sessão do Google expirada. Refaça o login.");
            return;
        }

        document.getElementById('sync-loader').classList.remove('hidden');
        
        try {
            const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${startDateISO}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${googleAccessToken}` }
            });
            const data = await response.json();

            if (data.items) {
                for (const event of data.items) {
                    const clientName = event.summary || "Cliente s/ nome";
                    const startTime = event.start.dateTime || event.start.date;
                    const price = event.description ? event.description.match(/R\$\s?(\d+)/)?.[0] || event.description : "A definir";

                    // Salva no Firestore respeitando a regra /appointments
                    await addDoc(collection(db, "appointments"), {
                        clientName: clientName,
                        start: Timestamp.fromDate(new Date(startTime)),
                        value: price,
                        googleId: event.id,
                        userId: currentUser.uid,
                        salonId: "default_salon"
                    });
                }
                
                await setDoc(doc(db, "users", currentUser.uid), { firstSyncDone: true }, { merge: true });
            }
        } catch (e) {
            console.error(e);
        } finally {
            document.getElementById('sync-loader').classList.add('hidden');
            document.getElementById('setup-modal').classList.add('hidden');
        }
    }

    document.getElementById('confirm-initial-sync').onclick = () => {
        const dateInput = document.getElementById('sync-date-input').value;
        if (!dateInput) return alert("Selecione uma data");
        syncEvents(new Date(dateInput).toISOString());
    };

    document.getElementById('force-sync').onclick = () => {
        syncEvents(new Date().toISOString());
    };

    // --- UI & Rendering ---
    function renderCalendar() {
        const container = document.getElementById('calendar-days');
        container.innerHTML = "";
        // Mock de dias para o layout (Abril 2026)
        for (let i = 29; i <= 31; i++) container.innerHTML += `<span class="opacity-20">${i}</span>`;
        for (let i = 1; i <= 30; i++) {
            const activeClass = i === 10 ? 'day-active' : '';
            container.innerHTML += `<span class="flex items-center justify-center w-8 h-8 mx-auto ${activeClass}">${i}</span>`;
        }
    }

    function listenAppointments() {
        const q = query(collection(db, "appointments"), where("userId", "==", currentUser.uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('appointments-list');
            list.innerHTML = "";
            
            const docs = snapshot.docs.map(d => d.data()).sort((a,b) => a.start - b.start);

            docs.forEach(app => {
                const date = app.start.toDate();
                const day = date.getDate();
                const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                list.innerHTML += `
                    <div class="flex gap-4 items-start">
                        <div class="flex flex-col items-center">
                            <span class="bg-white text-pink-500 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shadow-md">${day}</span>
                            <div class="w-px h-12 border-l border-dashed border-white opacity-40 mt-2"></div>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg leading-tight">${app.clientName}</h4>
                            <p class="text-xs opacity-70 mb-2">${time}</p>
                            <p class="text-sm font-medium"><i class="fas fa-tag mr-2 text-xs"></i>${app.value}</p>
                        </div>
                    </div>
                `;
            });

            if(docs.length === 0) {
                list.innerHTML = "<p class='text-center opacity-50 py-10'>Nenhum agendamento encontrado.</p>";
            }
        });
    }

</script>
</body>
</html>
