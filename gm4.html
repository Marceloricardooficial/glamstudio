<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, Timestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOkgAXmN3HqB_zjfiMT7QQ1cvRmFtu8lA",
        authDomain: "glam-studio-8b65c.firebaseapp.com",
        projectId: "glam-studio-8b65c",
        storageBucket: "glam-studio-8b65c.firebasestorage.app",
        messagingSenderId: "154294556895",
        appId: "1:154294556895:web:a42cad3171fb0fbfa7716a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/calendar.readonly');

    let googleToken = null;
    let selectedDate = new Date();
    let currentCalendarMonth = new Date().getMonth();
    let currentCalendarYear = new Date().getFullYear();
    let allAppointments = [];

    const monthsNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    // --- LÓGICA DE CALENDÁRIO ---
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const monthTabs = document.getElementById('month-tabs');
        const displayYear = document.getElementById('display-year');
        
        grid.innerHTML = "";
        monthTabs.innerHTML = "";
        displayYear.innerText = currentCalendarYear;

        monthsNames.forEach((m, idx) => {
            const short = m.substring(0, 3).toUpperCase();
            const isActive = idx === currentCalendarMonth;
            const span = document.createElement('span');
            span.innerText = short;
            span.className = `${isActive ? 'text-gray-800 border-b-2 border-pink-500 pb-1' : ''} cursor-pointer hover:text-gray-500 font-black`;
            span.onclick = () => { currentCalendarMonth = idx; renderCalendar(); };
            monthTabs.appendChild(span);
        });

        const firstDay = new Date(currentCalendarYear, currentCalendarMonth, 1).getDay();
        const daysInMonth = new Date(currentCalendarYear, currentCalendarMonth + 1, 0).getDate();
        const prevDaysInMonth = new Date(currentCalendarYear, currentCalendarMonth, 0).getDate();

        for (let i = firstDay - 1; i >= 0; i--) {
            grid.innerHTML += `<div class="day-cell day-outside">${prevDaysInMonth - i}</div>`;
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const d = new Date(currentCalendarYear, currentCalendarMonth, i);
            const isToday = i === new Date().getDate() && currentCalendarMonth === new Date().getMonth() && currentCalendarYear === new Date().getFullYear();
            const isSelected = i === selectedDate.getDate() && currentCalendarMonth === selectedDate.getMonth() && currentCalendarYear === selectedDate.getFullYear();
            
            const hasEvents = allAppointments.some(app => {
                const ad = app.start.toDate();
                return ad.getDate() === i && ad.getMonth() === currentCalendarMonth && ad.getFullYear() === currentCalendarYear;
            });

            grid.innerHTML += `
                <div class="day-cell ${isToday ? 'day-today' : ''} ${isSelected ? 'day-active' : ''} ${hasEvents ? 'day-has-event' : ''}" 
                     onclick="window.selectDay(${i})">${i}</div>`;
        }
    }

    window.selectDay = (d) => {
        selectedDate = new Date(currentCalendarYear, currentCalendarMonth, d);
        renderCalendar();
        filterAppointments();
    };

    document.getElementById('prev-month').onclick = () => {
        currentCalendarMonth--;
        if (currentCalendarMonth < 0) { currentCalendarMonth = 11; currentCalendarYear--; }
        renderCalendar();
    };

    document.getElementById('next-month').onclick = () => {
        currentCalendarMonth++;
        if (currentCalendarMonth > 11) { currentCalendarMonth = 0; currentCalendarYear++; }
        renderCalendar();
    };

    // --- LÓGICA DE DADOS ---
    function filterAppointments() {
        const list = document.getElementById('appointments-list');
        const label = document.getElementById('list-label');
        list.innerHTML = "";

        const isToday = selectedDate.toDateString() === new Date().toDateString();
        label.innerText = isToday ? "Today" : `${selectedDate.getDate()} de ${monthsNames[selectedDate.getMonth()]}`;

        const filtered = allAppointments.filter(app => {
            const d = app.start.toDate();
            return d.getDate() === selectedDate.getDate() && 
                   d.getMonth() === selectedDate.getMonth() && 
                   d.getFullYear() === selectedDate.getFullYear();
        }).sort((a,b) => a.start - b.start);

        if (filtered.length === 0) {
            list.innerHTML = `<div class="py-16 text-center opacity-40 font-black text-xs uppercase tracking-widest">Nenhum atendimento</div>`;
            return;
        }

        filtered.forEach(app => {
            const time = app.start.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            list.innerHTML += `
                <div class="flex gap-6 items-start animate-fade-in">
                    <div class="flex flex-col items-center">
                        <span class="bg-white text-pink-500 w-9 h-9 rounded-full flex items-center justify-center text-xs font-black shadow-lg">${selectedDate.getDate()}</span>
                        <div class="w-px h-14 border-l-2 border-dashed border-white opacity-20 mt-2"></div>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-black text-lg uppercase tracking-tight">${app.clientName}</h4>
                        <p class="text-[10px] font-bold opacity-60 mb-2">${time}</p>
                        <div class="inline-flex items-center bg-white bg-opacity-20 px-3 py-1 rounded-full text-[10px] font-black">
                            <i class="fas fa-wallet mr-2 text-[8px]"></i> ${app.value}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function listenAppointments(uid) {
        const q = query(collection(db, "appointments"), where("userId", "==", uid));
        onSnapshot(q, (snapshot) => {
            allAppointments = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
            renderCalendar(); // Re-render para atualizar os pontinhos sob os dias
            filterAppointments();
        });
    }

    // --- SINCRONISMO ---
    async function startSync(dateStart) {
        if (!googleToken) {
            const result = await signInWithPopup(auth, provider);
            googleToken = GoogleAuthProvider.credentialFromResult(result).accessToken;
        }

        const overlay = document.getElementById('sync-overlay');
        const statusContent = document.getElementById('sync-status-content');
        overlay.classList.remove('hidden');
        document.getElementById('sync-modal').classList.add('hidden');

        try {
            const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${new Date(dateStart).toISOString()}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${googleToken}` }
            });
            const data = await response.json();

            if (data.items) {
                let count = 0;
                for (const item of data.items) {
                    const price = item.description ? (item.description.match(/R\$\s?(\d+)/)?.[0] || item.description) : "R$ 0,00";
                    
                    // Verifica se já existe para evitar duplicados simples por googleId
                    const qExisting = query(collection(db, "appointments"), where("googleId", "==", item.id));
                    const snapExisting = await getDoc(doc(db, "appointments", item.id)); // Ou check simples

                    await addDoc(collection(db, "appointments"), {
                        clientName: item.summary || "Cliente",
                        start: Timestamp.fromDate(new Date(item.start.dateTime || item.start.date)),
                        value: price,
                        userId: auth.currentUser.uid,
                        salonId: "glam_studio_main",
                        googleId: item.id
                    });
                    count++;
                }

                statusContent.innerHTML = `
                    <div class="w-16 h-16 bg-white text-pink-500 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-check text-2xl"></i>
                    </div>
                    <p class="font-black text-sm tracking-widest uppercase">${count} ATENDIMENTOS SINCRONIZADOS</p>
                    <button id="btn-sync-done" class="mt-6 border-2 border-white px-6 py-2 rounded-full font-black text-xs">OK</button>
                `;
                
                document.getElementById('btn-sync-done').onclick = () => overlay.classList.add('hidden');
            } else {
                alert("Nenhum evento encontrado no Google Calendar.");
                overlay.classList.add('hidden');
            }
        } catch (e) {
            console.error(e);
            alert("Erro na sincronização.");
            overlay.classList.add('hidden');
        }
    }

    // --- BOTÕES E FLOW ---
    document.getElementById('btn-login').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            googleToken = GoogleAuthProvider.credentialFromResult(result).accessToken;
            await setDoc(doc(db, "users", result.user.uid), {
                name: result.user.displayName,
                email: result.user.email,
                salonId: "glam_studio_main"
            }, { merge: true });
        } catch (e) { console.error(e); }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
    document.getElementById('btn-open-sync').onclick = () => document.getElementById('sync-modal').classList.remove('hidden');
    document.getElementById('btn-close-sync').onclick = () => document.getElementById('sync-modal').classList.add('hidden');
    
    document.getElementById('btn-start-sync').onclick = () => {
        const d = document.getElementById('sync-date-start').value;
        if (!d) return alert("Selecione uma data.");
        startSync(d);
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            renderCalendar();
            listenAppointments(user.uid);
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('main-view').classList.add('hidden');
        }
    });

</script>
</body>
</html>
