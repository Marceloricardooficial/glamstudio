<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative bg-white">
    
    <!-- TELA DE LOGIN (Primeira coisa que aparece) -->
    <div id="login-view" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-8 text-center">

            </div>

            <div id="sync-loader" class="hidden absolute inset-0 bg-pink-500 bg-opacity-90 flex flex-col items-center justify-center rounded-t-3xl z-20">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-white h-12 w-12 mb-4"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, Timestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDOkgAXmN3HqB_zjfiMT7QQ1cvRmFtu8lA",
        authDomain: "glam-studio-8b65c.firebaseapp.com",
        projectId: "glam-studio-8b65c",
        storageBucket: "glam-studio-8b65c.firebasestorage.app",
        messagingSenderId: "154294556895",
        appId: "1:154294556895:web:a42cad3171fb0fbfa7716a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/calendar.readonly');

    let googleAccessToken = null;

    // --- ELEMENTOS UI ---
    const loginView = document.getElementById('login-view');
    const mainView = document.getElementById('main-view');
    const setupModal = document.getElementById('setup-modal');
    const appointmentsList = document.getElementById('appointments-list');
    const syncLoader = document.getElementById('sync-loader');

    // --- AUTENTICAÇÃO ---
    document.getElementById('btn-login').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const credential = GoogleAuthProvider.credentialFromResult(result);
            googleAccessToken = credential.accessToken;
            
            // Criar/Verificar Usuário para obedecer Regras do Firestore
            const userRef = doc(db, "users", result.user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    name: result.user.displayName,
                    email: result.user.email,
                    salonId: "glam_main", // salonId necessário para as regras do Firestore
                    role: "user",
                    firstSyncDone: false,
                    lastSync: null
                });
            }
        } catch (error) {
            console.error(error);
            alert("Erro ao entrar: " + error.message);
        }
    };

    document.getElementById('btn-logout').onclick = async () => {
        if(confirm("Deseja realmente sair?")) {
            await signOut(auth);
            location.reload();
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginView.classList.add('hidden');
            mainView.classList.remove('hidden');
            renderCalendar();
            checkFirstSync(user.uid);
            listenToAppointments(user.uid);
        } else {
            loginView.classList.remove('hidden');
            mainView.classList.add('hidden');
        }
    });

    async function checkFirstSync(uid) {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists() && !userSnap.data().firstSyncDone) {
            setupModal.classList.remove('hidden');
        }
    }

    // --- SINCRONISMO GOOGLE CALENDAR ---
    async function syncFromGoogle(startDate) {
        if (!googleAccessToken) {
            // Se o token expirou (comum em SPAs), pedimos login silencioso ou popup
            try {
                const result = await signInWithPopup(auth, provider);
                googleAccessToken = GoogleAuthProvider.credentialFromResult(result).accessToken;
            } catch(e) { return alert("Sessão Google expirou. Logue novamente."); }
        }

        syncLoader.classList.remove('hidden');
        const isoDate = new Date(startDate).toISOString();

        try {
            const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${isoDate}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${googleAccessToken}` }
            });
            const data = await response.json();

            if (data.items) {
                for (const event of data.items) {
                    const clientName = event.summary || "Sem Nome";
                    const startTime = event.start.dateTime || event.start.date;
                    // Tenta capturar valor da descrição (ex: R$ 150)
                    const price = event.description ? (event.description.match(/R\$\s?(\d+)/)?.[0] || event.description) : "R$ --";

                    // Regras Firestore exigem salonId e userId
                    await addDoc(collection(db, "appointments"), {
                        clientName: clientName,
                        start: Timestamp.fromDate(new Date(startTime)),
                        value: price,
                        googleId: event.id,
                        userId: auth.currentUser.uid,
                        salonId: "glam_main" 
                    });
                }
                
                // Marcar como sincronizado
                await setDoc(doc(db, "users", auth.currentUser.uid), { 
                    firstSyncDone: true,
                    lastSync: Timestamp.now()
                }, { merge: true });
            }
            
            setupModal.classList.add('hidden');
        } catch (e) {
            console.error("Sync Error:", e);
            alert("Erro ao buscar dados do Google.");
        } finally {
            syncLoader.classList.add('hidden');
        }
    }

    document.getElementById('confirm-initial-sync').onclick = () => {
        const val = document.getElementById('sync-date-input').value;
        if(!val) return alert("Escolha uma data.");
        syncFromGoogle(val);
    };

    document.getElementById('btn-sync-now').onclick = () => {
        syncFromGoogle(new Date().toISOString());
    };

    // --- RENDERIZAÇÃO ---
    function renderCalendar() {
        const container = document.getElementById('calendar-days');
        container.innerHTML = "";
        // Preenchimento fake para o mês de Abril conforme a imagem
        for (let i = 29; i <= 31; i++) container.innerHTML += `<span class="opacity-20">${i}</span>`;
        for (let i = 1; i <= 30; i++) {
            const activeClass = i === 10 ? 'day-active shadow-lg' : '';
            container.innerHTML += `<span class="flex items-center justify-center w-8 h-8 mx-auto ${activeClass}">${i}</span>`;
        }
    }

    function listenToAppointments(uid) {
        const q = query(collection(db, "appointments"), where("userId", "==", uid));
        onSnapshot(q, (snapshot) => {
            appointmentsList.innerHTML = "";
            const docs = snapshot.docs.map(d => ({id: d.id, ...d.data()}))
                        .sort((a,b) => a.start.seconds - b.start.seconds);

            docs.forEach(app => {
                const date = app.start.toDate();
                const day = date.getDate();
                const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                appointmentsList.innerHTML += `
                    <div class="flex gap-4 items-start group">
                        <div class="flex flex-col items-center">
                            <span class="bg-white text-pink-500 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shadow-md">${day}</span>
                            <div class="w-px h-12 border-l border-dashed border-white opacity-40 mt-2"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <h4 class="font-bold text-lg leading-tight uppercase tracking-wide">${app.clientName}</h4>
                                <button onclick="window.deleteApp('${app.id}')" class="opacity-0 group-hover:opacity-60 text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                            <p class="text-xs opacity-70 mb-1 font-medium">${time}</p>
                            <p class="text-sm font-bold bg-white bg-opacity-20 inline-block px-2 py-0.5 rounded">${app.value}</p>
                        </div>
                    </div>
                `;
            });

            if(docs.length === 0) {
                appointmentsList.innerHTML = `
                    <div class="text-center py-10 opacity-60">
                        <i class="fas fa-calendar-day text-4xl mb-3"></i>
                        <p>Nenhum agendamento sincronizado.</p>
                    </div>
                `;
            }
        });
    }

    // Função de deletar global para o onclick
    window.deleteApp = async (id) => {
        if(confirm("Apagar este registro do sistema?")) {
            await deleteDoc(doc(db, "appointments", id));
        }
    };

</script>
</body>
</html>
