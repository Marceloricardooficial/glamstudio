<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#E91E63">
    <title>Glam Studio · Diagnóstico</title>
    <!-- PWA manifest (base64) omitido por brevidade, mesmo conteúdo anterior -->
    <link rel="manifest" href="data:application/json;base64,...">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* ... (mantenha todo o CSS da resposta anterior, está funcional) ... */
        /* Adicione este estilo para a área de log */
        .debug-panel {
            background: #1e1e1e;
            color: #0f0;
            font-family: monospace;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            display: none;
        }
        .debug-panel.show { display: block; }
        .status-badge.sync-test { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
<!-- Tela de Login (idêntica) -->
<div id="login-screen">...</div>

<!-- App Container -->
<div id="app-container" class="hidden">
    <!-- Header igual -->
    <header class="app-header">...</header>
    <main class="main-content">
        <!-- Views home, calendar, finance (mesmo HTML) -->
    </main>
    <nav class="bottom-nav">...</nav>
</div>

<!-- Modal de Sincronização com área de debug -->
<div id="syncModal" class="modal">
    <div class="modal-content">
        <h3>Sincronizar Google Calendar</h3>
        <p>Escolha o período:</p>
        <select id="sync-period" style="width:100%; padding:14px; border-radius:40px; border:1px solid #ddd; margin-bottom:16px;">
            <option value="currentMonth">Mês atual</option>
            <option value="lastMonth">Último mês</option>
            <option value="last2Months">Últimos 2 meses</option>
            <option value="custom">Personalizado</option>
        </select>
        <div id="custom-date-range" style="display:none; gap:8px; margin-bottom:16px;">
            <input type="date" id="start-date" style="flex:1; padding:12px; border-radius:40px; border:1px solid #ddd;">
            <input type="date" id="end-date" style="flex:1; padding:12px; border-radius:40px; border:1px solid #ddd;">
        </div>
        <button class="btn-block" id="confirm-sync">🔍 Sincronizar e Diagnosticar</button>
        
        <!-- Painel de Debug -->
        <div id="sync-debug" class="debug-panel"></div>
        <div id="sync-progress" style="margin-top: 16px; text-align: center; display: none;">
            <div class="spinner" style="margin: 0 auto 8px;"></div>
            <span id="sync-status-text">Conectando...</span>
        </div>
        <button onclick="app.closeSyncModal()" style="margin-top:12px; width:100%; padding:14px;">Fechar</button>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
    // Configuração Firebase (mesma)
    const firebaseConfig = {
        apiKey: "AIzaSyDOkgAXmN3HqB_zjfiMT7QQ1cvRmFtu8lA",
        authDomain: "glam-studio-8b65c.firebaseapp.com",
        projectId: "glam-studio-8b65c",
        storageBucket: "glam-studio-8b65c.firebasestorage.app",
        messagingSenderId: "154294556895",
        appId: "1:154294556895:web:a42cad3171fb0fbfa7716a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const GOOGLE_CLIENT_ID = "1053509141917-v8hgde8nrl8gd0k7a7acko6tibenobi6.apps.googleusercontent.com";
    const CALENDAR_SCOPES = [
        'https://www.googleapis.com/auth/calendar.readonly',
        'https://www.googleapis.com/auth/calendar.events.readonly'
    ].join(' ');

    // Estado global
    const state = {
        user: null,
        accessToken: null,
        currentView: 'home',
        selectedDate: new Date(),
        displayMonth: new Date(),
        appointments: [],
        charts: {},
        selectedAppointmentId: null
    };

    const app = {
        async init() {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    state.user = user;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    this.updateProfileUI();
                    
                    // Recupera token do localStorage
                    const savedToken = localStorage.getItem('googleAccessToken');
                    if (savedToken) state.accessToken = savedToken;
                    
                    await this.loadLocalAppointments();
                    this.renderAll();
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('app-container').classList.add('hidden');
                }
            });

            document.getElementById('google-login-btn').onclick = () => this.login();
            this.setupNavigation();
            this.initCharts();
            this.setupSyncModal();

            // Trata redirect
            this.handleRedirectResult();
        },

        async login() {
            document.getElementById('login-spinner').style.display = 'block';
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope(CALENDAR_SCOPES);
            provider.setCustomParameters({ prompt: 'consent' });
            try {
                const result = await auth.signInWithPopup(provider);
                this.handleAuthResult(result);
            } catch (e) {
                if (e.code === 'auth/popup-blocked') {
                    await auth.signInWithRedirect(provider);
                } else {
                    document.getElementById('login-error').innerText = 'Erro: ' + e.message;
                }
            } finally {
                document.getElementById('login-spinner').style.display = 'none';
            }
        },

        async handleRedirectResult() {
            try {
                const result = await auth.getRedirectResult();
                if (result.user) this.handleAuthResult(result);
            } catch (e) {
                console.warn('Redirect error:', e);
            }
        },

        handleAuthResult(result) {
            state.user = result.user;
            if (result.credential) {
                state.accessToken = result.credential.accessToken;
                localStorage.setItem('googleAccessToken', state.accessToken);
                this.logDebug('✅ Token obtido: ' + (state.accessToken ? 'Sim' : 'Não'));
            } else {
                this.logDebug('⚠️ Credencial sem accessToken. Tentando obter novamente...');
                // Força reautenticação para obter token
                this.ensureToken();
            }
        },

        async ensureToken() {
            if (!state.accessToken) {
                this.logDebug('🔄 Solicitando novo token...');
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope(CALENDAR_SCOPES);
                try {
                    const result = await auth.currentUser.reauthenticateWithPopup(provider);
                    state.accessToken = result.credential?.accessToken;
                    localStorage.setItem('googleAccessToken', state.accessToken);
                    this.logDebug('✅ Novo token obtido.');
                } catch (e) {
                    this.logDebug('❌ Falha ao obter token: ' + e.message);
                    throw e;
                }
            }
            return state.accessToken;
        },

        logDebug(message) {
            const panel = document.getElementById('sync-debug');
            panel.classList.add('show');
            panel.innerHTML += message + '\n';
            panel.scrollTop = panel.scrollHeight;
            console.log(message);
        },

        clearDebug() {
            document.getElementById('sync-debug').innerHTML = '';
        },

        setupSyncModal() {
            document.getElementById('sync-header-btn').onclick = () => {
                this.clearDebug();
                document.getElementById('syncModal').classList.add('show');
                document.getElementById('sync-progress').style.display = 'none';
                document.getElementById('confirm-sync').style.display = 'block';
            };
            document.getElementById('sync-period').addEventListener('change', (e) => {
                document.getElementById('custom-date-range').style.display = e.target.value === 'custom' ? 'flex' : 'none';
            });
            document.getElementById('confirm-sync').onclick = () => this.diagnosticSync();
        },

        async diagnosticSync() {
            const syncBtn = document.getElementById('confirm-sync');
            const progressDiv = document.getElementById('sync-progress');
            const statusText = document.getElementById('sync-status-text');
            
            syncBtn.style.display = 'none';
            progressDiv.style.display = 'block';
            this.clearDebug();
            
            try {
                // 1. Verificar token
                statusText.innerText = 'Verificando token...';
                this.logDebug('🔑 Verificando token de acesso...');
                const token = await this.ensureToken();
                this.logDebug('Token: ' + token.substring(0, 20) + '...');
                
                // 2. Verificar escopos (opcional, via token info)
                statusText.innerText = 'Validando escopos...';
                const tokenInfo = await fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${token}`).then(r => r.json());
                this.logDebug('📋 Escopos concedidos: ' + (tokenInfo.scope || 'Nenhum'));
                if (!tokenInfo.scope || !tokenInfo.scope.includes('calendar')) {
                    throw new Error('Escopo do Calendar não concedido. Refaça o login.');
                }
                
                // 3. Determinar período
                const period = document.getElementById('sync-period').value;
                let timeMin, timeMax;
                const now = new Date();
                if (period === 'currentMonth') {
                    timeMin = new Date(now.getFullYear(), now.getMonth(), 1);
                    timeMax = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
                } else if (period === 'lastMonth') {
                    timeMin = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    timeMax = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
                } else if (period === 'last2Months') {
                    timeMin = new Date(now.getFullYear(), now.getMonth() - 2, 1);
                    timeMax = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
                } else {
                    const start = document.getElementById('start-date').value;
                    const end = document.getElementById('end-date').value;
                    if (!start || !end) throw new Error('Datas inválidas');
                    timeMin = new Date(start);
                    timeMax = new Date(end);
                    timeMax.setHours(23, 59, 59);
                }
                this.logDebug(`📅 Período: ${timeMin.toLocaleDateString()} - ${timeMax.toLocaleDateString()}`);
                
                // 4. Chamar API Calendar
                statusText.innerText = 'Buscando eventos...';
                const events = await this.fetchGoogleEvents(token, timeMin, timeMax);
                this.logDebug(`📬 Eventos retornados: ${events.length}`);
                
                // 5. Salvar no Firestore
                statusText.innerText = 'Salvando...';
                const savedCount = await this.saveEventsToFirestore(events);
                this.logDebug(`💾 Documentos salvos: ${savedCount}`);
                
                // 6. Recarregar
                await this.loadLocalAppointments();
                this.renderAll();
                
                this.showToast(`✅ ${events.length} eventos sincronizados!`);
                this.closeSyncModal();
            } catch (error) {
                this.logDebug('❌ ERRO: ' + error.message);
                statusText.innerText = 'Erro: ' + error.message;
                this.showToast('❌ Falha na sincronização');
                console.error(error);
            } finally {
                syncBtn.style.display = 'block';
                progressDiv.style.display = 'none';
            }
        },

        async fetchGoogleEvents(token, timeMin, timeMax) {
            const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin.toISOString()}&timeMax=${timeMax.toISOString()}&singleEvents=true&maxResults=2500&orderBy=startTime`;
            this.logDebug('🌐 Chamando API: ' + url);
            const response = await fetch(url, {
                headers: { Authorization: `Bearer ${token}` }
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                this.logDebug('📛 Resposta de erro: ' + JSON.stringify(errorData));
                throw new Error(`API Calendar: ${errorData.error?.message || response.status}`);
            }
            
            const data = await response.json();
            return data.items || [];
        },

        async saveEventsToFirestore(events) {
            const batch = db.batch();
            let count = 0;
            for (const ev of events) {
                if (!ev.start?.dateTime) continue;
                const value = this.extractValue(ev.summary, ev.description);
                const ref = db.collection('appointments').doc(ev.id);
                batch.set(ref, {
                    userId: state.user.uid,
                    eventId: ev.id,
                    title: ev.summary || 'Sem título',
                    description: ev.description || '',
                    start: ev.start.dateTime,
                    end: ev.end.dateTime,
                    value: value,
                    status: 'pending',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                count++;
            }
            if (count > 0) await batch.commit();
            return count;
        },

        extractValue(title, desc) {
            const text = (title + ' ' + (desc || '')).toUpperCase();
            const match = text.match(/R?\$?\s*(\d+[.,]?\d{0,2})/);
            if (match) return parseFloat(match[1].replace(',', '.')) || 0;
            return 0;
        },

        closeSyncModal() {
            document.getElementById('syncModal').classList.remove('show');
        },

        // ... (restante das funções de renderização, navegação, etc., mantidas da resposta anterior) ...
    };

    // Inicialização
    window.app = app;
    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
